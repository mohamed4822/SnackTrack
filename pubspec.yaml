name: health_assistant
description: "A health and wellness application that helps users manage their diet by analyzing meal descriptions and providing AI-generated nutritional advice and recipe alternatives"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.0
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  dio: ^5.4.0

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/AZ2b2n-rOotchZVUUYZrjQ-AZ2b2n-rXCBspZc9q0XdFw.jpg"